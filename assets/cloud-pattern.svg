<!--
  中国云纹装饰 SVG
  传统祥云纹样，页面装饰用
  viewBox: 0 0 120 40 | stroke-based
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40">
  <defs>
    <style>
      .cloud { fill: none; stroke: #8B2500; stroke-linecap: round; stroke-linejoin: round; opacity: 0.35; }
    </style>
  </defs>

  <!-- 主祥云：左侧卷云 -->
  <path class="cloud" stroke-width="1.2"
        d="M10,30
           C10,30 12,22 18,20
           C14,20 12,16 14,12
           C16,8 22,8 24,12
           C26,6 34,6 36,12
           C40,8 44,10 44,14
           C48,12 50,16 48,20
           C52,20 52,26 46,28
           C42,30 36,30 30,28
           C26,32 16,32 10,30
           Z"/>

  <!-- 中间祥云：小卷云 -->
  <path class="cloud" stroke-width="1.0"
        d="M58,30
           C58,30 60,24 64,22
           C62,22 60,18 62,15
           C64,12 68,12 70,15
           C72,12 76,14 74,18
           C78,16 80,20 78,24
           C80,24 80,28 76,30
           C72,32 64,32 58,30
           Z"/>

  <!-- 右侧祥云：延伸卷云 -->
  <path class="cloud" stroke-width="1.2"
        d="M86,30
           C86,30 88,24 92,22
           C90,22 88,18 90,14
           C92,10 96,10 98,14
           C100,10 104,10 106,14
           C108,10 112,12 112,16
           C114,14 116,18 114,22
           C118,20 118,26 114,28
           C110,32 100,32 94,28
           C90,32 86,32 86,30
           Z"/>

  <!-- 细节：左侧云尾 -->
  <path class="cloud" stroke-width="0.8"
        d="M6,32 C4,28 6,24 10,24 C8,26 8,30 6,32"/>

  <!-- 细节：右侧云尾 -->
  <path class="cloud" stroke-width="0.8"
        d="M116,30 C118,26 116,22 112,22 C114,24 114,28 116,30"/>
</svg>
